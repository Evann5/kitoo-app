name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 requiert Node >= 22.13.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Tests (coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
        env:
          # Le client Supabase est tolérant à l'absence de variables ; on
          # transmet les secrets s'ils existent (sinon build avec placeholders).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

# Les tests end-to-end (Playwright) nécessitent un projet Supabase et créent des
# comptes éphémères ; ils se lancent en local avec `pnpm test:e2e`
# (cf. README / CONTRIBUTING). Ils ne sont pas exécutés dans cette CI pour
# éviter d'écrire dans la base partagée.
